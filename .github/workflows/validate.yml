name: GrOS Validation

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build and validate GrOS
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make nasm qemu-system-x86

      - name: Run full validation
        run: make validate

      - name: Smoke stage-2 boot
        run: make smoke-stage2
