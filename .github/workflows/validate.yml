name: GrOS Validation

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build and validate GrOS
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make nasm

      - name: Run raw builder tests
        run: make test

      - name: Build and check boot sector
        run: make check

      - name: Validate generated boot image
        run: ./scripts/validate_boot_image.sh --require-ndisasm build/gros-v0.5.gro

      - name: Validate committed dist artifact
        run: ./scripts/validate_boot_image.sh --require-ndisasm dist/gros-v0.5.gro

      - name: Check artifact parity
        run: cmp -s build/gros-v0.5.gro dist/gros-v0.5.gro
